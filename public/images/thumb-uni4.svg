<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#09332C"/>

  <!-- Central unified platform -->
  <rect x="200" y="340" width="400" height="80" rx="8" fill="#F7EDDA" fill-opacity="0.12" stroke="#F7EDDA" stroke-opacity="0.22" stroke-width="1.5"/>
  <rect x="220" y="358" width="100" height="8" rx="3" fill="#F7EDDA" fill-opacity="0.40"/>
  <rect x="220" y="376" width="160" height="6" rx="2" fill="#F7EDDA" fill-opacity="0.18"/>
  <rect x="220" y="390" width="120" height="6" rx="2" fill="#F7EDDA" fill-opacity="0.12"/>
  <!-- Platform badge -->
  <rect x="500" y="358" width="80" height="26" rx="13" fill="#F0531C" fill-opacity="0.55"/>
  <rect x="514" y="367" width="52" height="8" rx="2" fill="#F7EDDA" fill-opacity="0.45"/>

  <!-- Brand tiles — Row 1 (3 tiles) -->
  <!-- Tile 1 -->
  <rect x="100" y="130" width="150" height="90" rx="7" fill="#F7EDDA" fill-opacity="0.09" stroke="#F7EDDA" stroke-opacity="0.18" stroke-width="1"/>
  <rect x="118" y="150" width="80" height="8" rx="3" fill="#F7EDDA" fill-opacity="0.35"/>
  <rect x="118" y="168" width="100" height="5" rx="2" fill="#F7EDDA" fill-opacity="0.16"/>
  <rect x="118" y="182" width="70" height="5" rx="2" fill="#F7EDDA" fill-opacity="0.12"/>
  <rect x="118" y="198" width="50" height="12" rx="6" fill="#F0531C" fill-opacity="0.35"/>

  <!-- Tile 2 -->
  <rect x="325" y="110" width="150" height="90" rx="7" fill="#F7EDDA" fill-opacity="0.11" stroke="#F7EDDA" stroke-opacity="0.22" stroke-width="1.5"/>
  <rect x="343" y="130" width="90" height="8" rx="3" fill="#F7EDDA" fill-opacity="0.45"/>
  <rect x="343" y="148" width="110" height="5" rx="2" fill="#F7EDDA" fill-opacity="0.18"/>
  <rect x="343" y="162" width="80" height="5" rx="2" fill="#F7EDDA" fill-opacity="0.14"/>
  <rect x="343" y="178" width="60" height="12" rx="6" fill="#F0531C" fill-opacity="0.45"/>

  <!-- Tile 3 -->
  <rect x="550" y="130" width="150" height="90" rx="7" fill="#F7EDDA" fill-opacity="0.09" stroke="#F7EDDA" stroke-opacity="0.18" stroke-width="1"/>
  <rect x="568" y="150" width="75" height="8" rx="3" fill="#F7EDDA" fill-opacity="0.35"/>
  <rect x="568" y="168" width="100" height="5" rx="2" fill="#F7EDDA" fill-opacity="0.16"/>
  <rect x="568" y="182" width="65" height="5" rx="2" fill="#F7EDDA" fill-opacity="0.12"/>
  <rect x="568" y="198" width="55" height="12" rx="6" fill="#F0531C" fill-opacity="0.30"/>

  <!-- Row 2 (2 tiles + empty) -->
  <!-- Tile 4 -->
  <rect x="180" y="248" width="140" height="70" rx="7" fill="#F7EDDA" fill-opacity="0.08" stroke="#F7EDDA" stroke-opacity="0.14" stroke-width="1"/>
  <rect x="196" y="262" width="80" height="7" rx="2" fill="#F7EDDA" fill-opacity="0.30"/>
  <rect x="196" y="278" width="100" height="5" rx="2" fill="#F7EDDA" fill-opacity="0.14"/>
  <rect x="196" y="292" width="60" height="10" rx="5" fill="#F0531C" fill-opacity="0.28"/>

  <!-- Tile 5 -->
  <rect x="480" y="248" width="140" height="70" rx="7" fill="#F7EDDA" fill-opacity="0.08" stroke="#F7EDDA" stroke-opacity="0.14" stroke-width="1"/>
  <rect x="496" y="262" width="70" height="7" rx="2" fill="#F7EDDA" fill-opacity="0.30"/>
  <rect x="496" y="278" width="90" height="5" rx="2" fill="#F7EDDA" fill-opacity="0.14"/>
  <rect x="496" y="292" width="55" height="10" rx="5" fill="#F0531C" fill-opacity="0.28"/>

  <!-- Connecting lines — from each tile bottom to platform top -->
  <line x1="175" y1="220" x2="280" y2="340" stroke="#F7EDDA" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="400" y1="200" x2="400" y2="340" stroke="#F0531C" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="625" y1="220" x2="520" y2="340" stroke="#F7EDDA" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="250" y1="318" x2="300" y2="340" stroke="#F7EDDA" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="550" y1="318" x2="500" y2="340" stroke="#F7EDDA" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- Connection nodes at intersection points -->
  <circle cx="280" cy="340" r="4" fill="#F7EDDA" fill-opacity="0.22"/>
  <circle cx="400" cy="340" r="4" fill="#F0531C" fill-opacity="0.55"/>
  <circle cx="520" cy="340" r="4" fill="#F7EDDA" fill-opacity="0.22"/>
</svg>
