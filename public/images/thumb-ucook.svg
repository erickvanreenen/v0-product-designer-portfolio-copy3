<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#09332C"/>

  <!-- Subtle dot grid background -->
  <g fill="#F7EDDA" fill-opacity="0.05">
    <circle cx="100" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="300" cy="100" r="2"/><circle cx="400" cy="100" r="2"/><circle cx="500" cy="100" r="2"/><circle cx="600" cy="100" r="2"/><circle cx="700" cy="100" r="2"/>
    <circle cx="100" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="300" cy="200" r="2"/><circle cx="400" cy="200" r="2"/><circle cx="500" cy="200" r="2"/><circle cx="600" cy="200" r="2"/><circle cx="700" cy="200" r="2"/>
    <circle cx="100" cy="300" r="2"/><circle cx="200" cy="300" r="2"/><circle cx="300" cy="300" r="2"/><circle cx="400" cy="300" r="2"/><circle cx="500" cy="300" r="2"/><circle cx="600" cy="300" r="2"/><circle cx="700" cy="300" r="2"/>
    <circle cx="100" cy="400" r="2"/><circle cx="200" cy="400" r="2"/><circle cx="300" cy="400" r="2"/><circle cx="400" cy="400" r="2"/><circle cx="500" cy="400" r="2"/><circle cx="600" cy="400" r="2"/><circle cx="700" cy="400" r="2"/>
  </g>

  <!-- Funnel bars — 5 steps, centered, narrowing downward -->
  <!-- Step 1 — widest, most transparent -->
  <rect x="90" y="102" width="620" height="40" rx="5" fill="#F7EDDA" fill-opacity="0.10"/>
  <circle cx="68" cy="122" r="5" fill="#F7EDDA" fill-opacity="0.18"/>

  <!-- Step 2 -->
  <rect x="160" y="160" width="480" height="40" rx="5" fill="#F7EDDA" fill-opacity="0.16"/>
  <circle cx="138" cy="180" r="5" fill="#F7EDDA" fill-opacity="0.28"/>

  <!-- Step 3 -->
  <rect x="240" y="218" width="320" height="40" rx="5" fill="#F7EDDA" fill-opacity="0.26"/>
  <circle cx="218" cy="238" r="5" fill="#F7EDDA" fill-opacity="0.45"/>

  <!-- Step 4 -->
  <rect x="310" y="276" width="180" height="40" rx="5" fill="#F7EDDA" fill-opacity="0.40"/>
  <circle cx="288" cy="296" r="5" fill="#FFA74F" fill-opacity="0.70"/>

  <!-- Step 5 — narrowest, orange = conversion achieved -->
  <rect x="356" y="334" width="88" height="40" rx="5" fill="#F0531C"/>
  <circle cx="334" cy="354" r="5" fill="#F0531C"/>

  <!-- Connecting left edge line -->
  <line x1="68" y1="122" x2="68" y2="296" stroke="#F7EDDA" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Before metric — top left, faint -->
  <text x="100" y="458" fill="#F7EDDA" fill-opacity="0.22" font-size="13" font-family="ui-sans-serif,system-ui,sans-serif" font-weight="500" letter-spacing="2">3.7%</text>
  <text x="140" y="458" fill="#F7EDDA" fill-opacity="0.12" font-size="11" font-family="ui-sans-serif,system-ui,sans-serif" letter-spacing="1">BEFORE</text>

  <!-- After metric — bottom right, prominent -->
  <text x="570" y="444" fill="#F0531C" fill-opacity="0.9" font-size="36" font-family="ui-sans-serif,system-ui,sans-serif" font-weight="700">9.3%</text>
  <text x="570" y="462" fill="#F7EDDA" fill-opacity="0.30" font-size="10" font-family="ui-sans-serif,system-ui,sans-serif" letter-spacing="2">COMPLETION</text>
</svg>
