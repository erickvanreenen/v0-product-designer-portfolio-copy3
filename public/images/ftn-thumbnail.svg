<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Forest green background -->
  <rect width="800" height="600" fill="#09332C"/>

  <!-- Concentric organic rings — nature / growth -->
  <circle cx="400" cy="310" r="280" fill="none" stroke="#F7EDDA" stroke-width="0.8" opacity="0.06"/>
  <circle cx="400" cy="310" r="220" fill="none" stroke="#F7EDDA" stroke-width="0.8" opacity="0.09"/>
  <circle cx="400" cy="310" r="160" fill="none" stroke="#F7EDDA" stroke-width="0.8" opacity="0.12"/>
  <circle cx="400" cy="310" r="100" fill="none" stroke="#F7EDDA" stroke-width="0.8" opacity="0.15"/>
  <circle cx="400" cy="310" r="44"  fill="none" stroke="#F7EDDA" stroke-width="0.8" opacity="0.18"/>

  <!-- Organic leaf arcs — upper right -->
  <path d="M 560 100 Q 700 200 640 360" fill="none" stroke="#F7EDDA" stroke-width="0.6" opacity="0.08"/>
  <path d="M 600 80  Q 760 220 680 400" fill="none" stroke="#F7EDDA" stroke-width="0.6" opacity="0.05"/>

