<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#09332C"/>

  <!-- Progress track line -->
  <line x1="100" y1="250" x2="700" y2="250" stroke="#F7EDDA" stroke-opacity="0.12" stroke-width="2"/>
  <!-- Completed segment (orange) -->
  <line x1="100" y1="250" x2="520" y2="250" stroke="#F0531C" stroke-opacity="0.45" stroke-width="2"/>

  <!-- MODULE NODES — 5 connected circles -->

  <!-- Node 1 — completed -->
  <circle cx="100" cy="250" r="44" fill="#F7EDDA" fill-opacity="0.10" stroke="#F7EDDA" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="100" cy="250" r="30" fill="#F7EDDA" fill-opacity="0.16"/>
  <text x="100" y="246" fill="#F7EDDA" fill-opacity="0.65" font-size="10" font-family="ui-sans-serif,system-ui,sans-serif" font-weight="600" text-anchor="middle" letter-spacing="1">01</text>
  <text x="100" y="260" fill="#F7EDDA" fill-opacity="0.35" font-size="8" font-family="ui-sans-serif,system-ui,sans-serif" text-anchor="middle" letter-spacing="1">INTRO</text>
  <!-- Check mark inner ring -->
  <circle cx="100" cy="250" r="18" fill="none" stroke="#F7EDDA" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Node 2 — completed -->
  <circle cx="250" cy="250" r="44" fill="#F7EDDA" fill-opacity="0.10" stroke="#F7EDDA" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="250" cy="250" r="30" fill="#F7EDDA" fill-opacity="0.16"/>
  <text x="250" y="246" fill="#F7EDDA" fill-opacity="0.65" font-size="10" font-family="ui-sans-serif,system-ui,sans-serif" font-weight="600" text-anchor="middle" letter-spacing="1">02</text>
  <text x="250" y="260" fill="#F7EDDA" fill-opacity="0.35" font-size="8" font-family="ui-sans-serif,system-ui,sans-serif" text-anchor="middle" letter-spacing="1">THEORY</text>
  <circle cx="250" cy="250" r="18" fill="none" stroke="#F7EDDA" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Node 3 — completed -->
  <circle cx="400" cy="250" r="44" fill="#F7EDDA" fill-opacity="0.10" stroke="#F7EDDA" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="400" cy="250" r="30" fill="#F7EDDA" fill-opacity="0.16"/>
  <text x="400" y="246" fill="#F7EDDA" fill-opacity="0.65" font-size="10" font-family="ui-sans-serif,system-ui,sans-serif" font-weight="600" text-anchor="middle" letter-spacing="1">03</text>
  <text x="400" y="260" fill="#F7EDDA" fill-opacity="0.35" font-size="8" font-family="ui-sans-serif,system-ui,sans-serif" text-anchor="middle" letter-spacing="1">APPLY</text>
  <circle cx="400" cy="250" r="18" fill="none" stroke="#F7EDDA" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Node 4 — ACTIVE (orange) -->
  <circle cx="550" cy="250" r="52" fill="#F0531C" fill-opacity="0.10" stroke="#F0531C" stroke-opacity="0.55" stroke-width="2"/>
  <circle cx="550" cy="250" r="36" fill="#F0531C" fill-opacity="0.20"/>
  <circle cx="550" cy="250" r="22" fill="#F0531C" fill-opacity="0.55"/>
  <text x="550" y="246" fill="#F7EDDA" fill-opacity="0.90" font-size="10" font-family="ui-sans-serif,system-ui,sans-serif" font-weight="700" text-anchor="middle" letter-spacing="1">04</text>
  <text x="550" y="260" fill="#F7EDDA" fill-opacity="0.60" font-size="8" font-family="ui-sans-serif,system-ui,sans-serif" text-anchor="middle" letter-spacing="1">ASSESS</text>

  <!-- Node 5 — upcoming (outline only) -->
  <circle cx="700" cy="250" r="44" fill="none" stroke="#F7EDDA" stroke-opacity="0.14" stroke-width="1.5" stroke-dasharray="6 4"/>
  <circle cx="700" cy="250" r="22" fill="none" stroke="#F7EDDA" stroke-opacity="0.10" stroke-width="1"/>
  <text x="700" y="246" fill="#F7EDDA" fill-opacity="0.25" font-size="10" font-family="ui-sans-serif,system-ui,sans-serif" font-weight="600" text-anchor="middle" letter-spacing="1">05</text>
  <text x="700" y="260" fill="#F7EDDA" fill-opacity="0.15" font-size="8" font-family="ui-sans-serif,system-ui,sans-serif" text-anchor="middle" letter-spacing="1">REVIEW</text>

  <!-- Progress label top -->
  <text x="100" y="158" fill="#F0531C" fill-opacity="0.55" font-size="11" font-family="ui-sans-serif,system-ui,sans-serif" letter-spacing="2">MODULE 4 OF 5</text>
  <rect x="100" y="168" width="290" height="4" rx="2" fill="#F7EDDA" fill-opacity="0.08"/>
  <rect x="100" y="168" width="232" height="4" rx="2" fill="#F0531C" fill-opacity="0.50"/>

  <!-- Small content blocks under active node -->
  <rect x="486" y="330" width="128" height="8" rx="2" fill="#F0531C" fill-opacity="0.30"/>
  <rect x="498" y="348" width="104" height="6" rx="2" fill="#F7EDDA" fill-opacity="0.12"/>
  <rect x="506" y="362" width="88" height="6" rx="2" fill="#F7EDDA" fill-opacity="0.08"/>
</svg>
