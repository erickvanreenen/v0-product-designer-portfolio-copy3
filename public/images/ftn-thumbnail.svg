  <!-- Category label -->
  <text x="48" y="560" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#F7EDDA" opacity="0.3" letter-spacing="3">E-COMMERCE · REDESIGN</text>
</svg>
